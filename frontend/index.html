<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Polkadot Space Fighting</title>
        <meta name="color-scheme" content="light dark" />
        <link href="./assets/css/style.css" rel="stylesheet" />
        <meta name="description" content="Polkadot Space Fighting is a fighting game for the Polkadot Solidity Hackathon 2026." />
    </head>
    <body>
        <noscript class="no-js" role="alert">
            <h2 class="no-js__title">JavaScript Desativado</h2>

            <p class="no-js__p">
                O jogo <strong class="no-js__strong">Polkadot Space Fighting</strong> precisa de JavaScript para funcionar. Por favor, ative-o nas configurações do seu navegador para jogar.
            </p>
        </noscript>

        <header class="header">
            <h1 class="header__title">
                <span class="header__polkadot">Polkadot</span> Space Fighting
            </h1>
        </header>

        <main class="game">
            <section class="game__screen">
                <header class="game__header">
                    <meter 
                    class="game__health game__health--player" 
                    id="playerHealth"
                    min="0" 
                    max="100" 
                    low="30" 
                    high="80" 
                    optimum="100" 
                    value="100"
                    ></meter>

                    <div class="game__hub">
                        <time 
                        class="game__timer"
                        id="timer"
                        datetime="PT60S"
                        role="timer"
                        aria-live="polite"
                        aria-label="Tempo restante"
                        >60</time>
                    </div>

                    <meter 
                    class="game__health" 
                    id="enemyHealth"
                    min="0" 
                    max="100" 
                    low="30" 
                    high="80" 
                    optimum="100" 
                    value="100"
                    ></meter>
                </header>

                <div class="game__viewport">
                    <canvas class="game__canvas game__canvas--fg" id="gameCanvas">
                        Desculpe-me, seu navegador não suporta a tag &lt;canvas&gt; (motor do jogo).
                    </canvas>

                    <canvas class="game__canvas game__canvas--bg" id="backgroundSpace">
                        Desculpe-me, seu navegador não suporta a tag &lt;canvas&gt; (gráfico do fundo).
                    </canvas>
                </div>

                <footer class="game__footer">
                    <menu class="game__menu">
                        <li class="game__item">
                            Attack:

                            <kbd class="game__kbd">
                                Z 
                            </kbd>

                            /

                            <kbd class="game__kbd">
                                1 
                            </kbd>
                        </li>
                    </menu>

                    <menu class="game__menu">
                        <li class="game__item">
                            Move:

                            <kbd class="game__kbd">
                                W    
                            </kbd>
                            
                            <kbd class="game__kbd">
                                A
                            </kbd>

                            <kbd class="game__kbd">
                                S
                            </kbd>

                            <kbd class="game__kbd">
                                D
                            </kbd>

                            /

                            <kbd class="game__kbd">
                                ↑   
                            </kbd>
                            
                            <kbd class="game__kbd">
                                ←
                            </kbd>

                            <kbd class="game__kbd">
                                ↓
                            </kbd>

                            <kbd class="game__kbd">
                                →
                            </kbd>
                        </li>
                    </menu>
                </footer>
            </section>
        </main>
        
        <footer class="footer">
            <small class="footer__copyright">
                &copy; José Nícollas Silva de Souza - Todos os direitos reservados.
            </small>
        </footer>

        <script src="./assets/js/script.js" type="module"></script>
    </body>
</html>
